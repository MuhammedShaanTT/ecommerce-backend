server:
  port: ${PORT:4000}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/multi_vendor_ecommerce}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:your_password}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:true}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:t1swa.official@gmail.com}
    password: ${EMAIL_APP_PASSWORD:placeholder}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true
            required: true

jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTSigning_at_least_256bits_long_secure_key}
  expiration: ${JWT_EXPIRATION:86400000}

tiswa:
  admin-email: ${ADMIN_EMAIL:t1swa.official@gmail.com}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost,http://localhost:80}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
