server:
  port: ${PORT:4000}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://shopverse-ui.onrender.com,http://localhost:3000,http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:t1swa.official@gmail.com}
    password: ${EMAIL_APP_PASSWORD:placeholder}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true
            required: true

tiswa:
  admin-email: ${ADMIN_EMAIL:t1swa.official@gmail.com}
